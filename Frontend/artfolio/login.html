<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Artfolio</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your Artfolio account</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
          <div class="form-error hidden" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" id="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
          <div class="form-error hidden" id="pw-error"></div>
        </div>
        <div class="form-error hidden" id="form-error" style="margin-bottom:16px;padding:12px;background:#fef2f2;border-radius:8px;"></div>
        <button type="submit" class="btn btn-primary w-full" id="submit-btn">Sign in</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Join Artfolio</a>
      </div>

      <div style="margin-top:24px;padding:16px;background:var(--secondary-bg);border-radius:8px;font-size:.8rem;color:var(--muted);">
        <strong style="color:var(--foreground);">Demo accounts:</strong><br>
        Artist: luna@artfolio.com / password123<br>
        Client: rachel@client.com / password123
      </div>
    </div>
  </main>

  <script type="module">
    import { renderNav } from '/js/nav.js';
    import { login } from '/js/api.js';
    import { setToken, requireGuest } from '/js/auth.js';
    import { error as showError, success } from '/js/toast.js';

    renderNav();
    requireGuest();

    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const formErr = document.getElementById('form-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) { document.getElementById('email-error').textContent = 'Email is required'; document.getElementById('email-error').classList.remove('hidden'); return; }
      document.getElementById('email-error').classList.add('hidden');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      formErr.classList.add('hidden');

      try {
        const res = await login(email, password);
        setToken(res.token);
        success('Welcome back!');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
      } catch (err) {
        formErr.textContent = err.message || 'Invalid email or password';
        formErr.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
